<title>Assistant RAG</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
	:root {
		color-scheme: light dark;
		--bg: #f5f5f7;
		--surface: #ffffff;
		--text: #1c1c1e;
		--text-muted: #6e6e73;
		--border: #d8d8dc;
		--accent: #2f6fed;
		--accent-text: #ffffff;
		--bubble-user: var(--accent);
		--bubble-assistant: #eceef1;
		--bubble-refusal: #fde8e8;
		--bubble-refusal-text: #8a2c2c;
	}

	@media (prefers-color-scheme: dark) {
		:root {
			--bg: #1c1c1e;
			--surface: #2c2c2e;
			--text: #f2f2f7;
			--text-muted: #9a9aa0;
			--border: #3a3a3c;
			--accent: #4c8dff;
			--accent-text: #ffffff;
			--bubble-user: var(--accent);
			--bubble-assistant: #3a3a3c;
			--bubble-refusal: #4a2626;
			--bubble-refusal-text: #f5b5b5;
		}
	}

	* {
		box-sizing: border-box;
	}

	html, body {
		height: 100%;
	}

	body {
		margin: 0;
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
		background: var(--bg);
		color: var(--text);
		display: flex;
		justify-content: center;
	}

	main {
		width: 100%;
		max-width: 720px;
		height: 100vh;
		display: flex;
		flex-direction: column;
	}

	header {
		padding: 1.25rem 1rem 0.75rem;
		border-bottom: 1px solid var(--border);
	}

	header h1 {
		margin: 0;
		font-size: 1.1rem;
		font-weight: 600;
	}

	header p {
		margin: 0.25rem 0 0.75rem;
		font-size: 0.85rem;
		color: var(--text-muted);
	}

	#log {
		flex: 1;
		overflow-y: auto;
		padding: 1rem;
		display: flex;
		flex-direction: column;
		gap: 0.75rem;
	}

	.message {
		max-width: 85%;
		padding: 0.6rem 0.9rem;
		border-radius: 1rem;
		line-height: 1.4;
		white-space: pre-wrap;
		word-break: break-word;
		font-size: 0.95rem;
	}

	.message.user {
		align-self: flex-end;
		background: var(--bubble-user);
		color: var(--accent-text);
		border-bottom-right-radius: 0.25rem;
	}

	.message.assistant {
		align-self: flex-start;
		background: var(--bubble-assistant);
		color: var(--text);
		border-bottom-left-radius: 0.25rem;
	}

	.message.refusal {
		align-self: flex-start;
		background: var(--bubble-refusal);
		color: var(--bubble-refusal-text);
		border-bottom-left-radius: 0.25rem;
	}

	.message.pending {
		align-self: flex-start;
		background: var(--bubble-assistant);
		color: var(--text-muted);
		font-style: italic;
	}

	form {
		display: flex;
		gap: 0.5rem;
		padding: 1rem;
		border-top: 1px solid var(--border);
	}

	textarea {
		flex: 1;
		resize: none;
		border: 1px solid var(--border);
		border-radius: 0.75rem;
		padding: 0.6rem 0.8rem;
		font-size: 0.95rem;
		font-family: inherit;
		background: var(--surface);
		color: var(--text);
		min-height: 2.5rem;
		max-height: 8rem;
	}

	textarea:focus {
		outline: 2px solid var(--accent);
		outline-offset: 1px;
	}

	button {
		border: none;
		border-radius: 0.75rem;
		padding: 0 1.1rem;
		background: var(--accent);
		color: var(--accent-text);
		font-size: 0.95rem;
		font-weight: 600;
		cursor: pointer;
	}

	button:disabled {
		opacity: 0.5;
		cursor: default;
	}
</style>

<main>
	<header>
		<h1>Assistant RAG</h1>
		<p>Pose une question sur la base de connaissances.</p>
	</header>
	<div id="log"></div>
	<form id="form">
		<textarea id="question" placeholder="Écris ta question…" rows="1" required></textarea>
		<button id="submit" type="submit">Envoyer</button>
	</form>
</main>

<script>
	const log = document.getElementById("log");
	const form = document.getElementById("form");
	const questionInput = document.getElementById("question");
	const submitButton = document.getElementById("submit");

	function addMessage(text, role) {
		const bubble = document.createElement("div");
		bubble.className = `message ${role}`;
		bubble.textContent = text;
		log.appendChild(bubble);
		log.scrollTop = log.scrollHeight;
		return bubble;
	}

	questionInput.addEventListener("input", () => {
		questionInput.style.height = "auto";
		questionInput.style.height = `${questionInput.scrollHeight}px`;
	});

	questionInput.addEventListener("keydown", (event) => {
		if (event.key === "Enter" && !event.shiftKey) {
			event.preventDefault();
			form.requestSubmit();
		}
	});

	form.addEventListener("submit", async (event) => {
		event.preventDefault();

		const question = questionInput.value.trim();
		if (!question) {
			return;
		}

		addMessage(question, "user");
		questionInput.value = "";
		questionInput.style.height = "auto";
		submitButton.disabled = true;

		const pendingBubble = addMessage("…", "pending");

		try {
			const response = await fetch("/ask", {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify({ question }),
			});

			if (!response.ok) {
				throw new Error(`HTTP ${response.status}`);
			}

			const data = await response.json();
			pendingBubble.remove();
			addMessage(data.answer, "assistant");
		} catch (error) {
			pendingBubble.remove();
			addMessage("Une erreur est survenue, réessaie dans un instant.", "refusal");
		} finally {
			submitButton.disabled = false;
			questionInput.focus();
		}
	});
</script>
